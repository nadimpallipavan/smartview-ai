# Render Blueprint for SmartView AI
# Deploys: web (Puma) + worker (Sidekiq) + PostgreSQL + Redis
# Docs: https://render.com/docs/blueprint-spec
#
# To deploy: push this repo to GitHub, then in the Render dashboard go to
# "New +" -> "Blueprint" and select this repository. Render reads this file
# and provisions everything. Set any AWS_* secrets in the dashboard afterward.

databases:
  - name: smartview-db
    databaseName: smartview_production
    user: smartview
    plan: free

services:
  # ---- Redis (Sidekiq queue + cache) ----
  - type: redis
    name: smartview-redis
    plan: free
    ipAllowList: []          # only reachable from inside Render's network
    maxmemoryPolicy: noeviction

  # ---- Web (Rails + Puma) ----
  - type: web
    name: smartview-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DATABASE_URL
        fromDatabase:
          name: smartview-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: smartview-redis
          property: connectionString
      - key: FACE_RECOGNITION_MOCK
        value: "true"
      # Shared secrets (same values across web + worker via the group below)
      - fromGroup: smartview-secrets

  # ---- Worker (Sidekiq) ----
  - type: worker
    name: smartview-sidekiq
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: bundle exec sidekiq
    plan: free
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: smartview-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: smartview-redis
          property: connectionString
      - key: FACE_RECOGNITION_MOCK
        value: "true"
      - fromGroup: smartview-secrets

# Shared secret env vars. generateValue creates one secure value per key that
# is shared by every service referencing this group — so web and worker use the
# SAME SECRET_KEY_BASE and encryption keys (required to read/write encrypted
# data and validate sessions consistently).
envVarGroups:
  - name: smartview-secrets
    envVars:
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
        generateValue: true
      - key: ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
        generateValue: true
      - key: ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
        generateValue: true
